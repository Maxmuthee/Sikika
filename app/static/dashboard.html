<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sikika — County Participation Dashboard</title>
  <style>
    :root {
      --bg: #f6f7f9; --panel: #ffffff; --ink: #1a1d21; --muted: #5b6470;
      --line: #e4e7eb; --brand: #0f766e; --brand-ink: #0b5a54;
      --support: #2563eb; --oppose: #d97706; --chip: #eef1f4;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0e1116; --panel: #171b22; --ink: #e8eaed; --muted: #9aa4b2;
        --line: #262c36; --brand: #2dd4bf; --brand-ink: #5eead4;
        --support: #60a5fa; --oppose: #fbbf24; --chip: #1f2530;
        --shadow: none;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--ink);
      font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    header {
      background: var(--brand); color: #fff; padding: 18px 24px;
      display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap;
    }
    header h1 { margin: 0; font-size: 20px; letter-spacing: .2px; }
    header .sub { opacity: .85; font-size: 13px; }
    header .spacer { flex: 1; }
    header button {
      background: rgba(255,255,255,.16); color: #fff; border: 1px solid rgba(255,255,255,.3);
      border-radius: 8px; padding: 7px 12px; font-size: 13px; cursor: pointer;
    }
    header button:hover { background: rgba(255,255,255,.26); }
    .wrap { display: grid; grid-template-columns: 320px 1fr; gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
    @media (max-width: 820px) { .wrap { grid-template-columns: 1fr; } }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; box-shadow: var(--shadow); }
    .list { padding: 8px; }
    .list h2, .detail h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: 12px 10px 8px; }
    .proj { padding: 12px; border-radius: 10px; cursor: pointer; border: 1px solid transparent; }
    .proj:hover { background: var(--chip); }
    .proj.active { border-color: var(--brand); background: var(--chip); }
    .proj .name { font-weight: 600; }
    .proj .meta { font-size: 12.5px; color: var(--muted); margin-top: 3px; }
    .detail { padding: 22px; }
    .titlerow { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .titlerow h3 { margin: 0; font-size: 22px; }
    .badge { font-size: 12px; padding: 3px 10px; border-radius: 999px; background: var(--chip); color: var(--muted); }
    .tiles { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 20px 0; }
    @media (max-width: 560px) { .tiles { grid-template-columns: repeat(2, 1fr); } }
    .tile { background: var(--chip); border-radius: 12px; padding: 14px; }
    .tile .n { font-size: 26px; font-weight: 700; line-height: 1; }
    .tile .l { font-size: 12px; color: var(--muted); margin-top: 6px; }
    .tile.support .n { color: var(--support); }
    .tile.oppose .n { color: var(--oppose); }
    .bar { height: 14px; border-radius: 999px; background: var(--chip); overflow: hidden; display: flex; }
    .bar .s { background: var(--support); }
    .bar .o { background: var(--oppose); }
    .barlabels { display: flex; justify-content: space-between; font-size: 12.5px; color: var(--muted); margin-top: 6px; }
    .brief { margin-top: 22px; padding: 18px; border-radius: 12px; border: 1px solid var(--line); }
    .brief .kicker { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--brand-ink); font-weight: 700; }
    .brief .headline { font-size: 17px; font-weight: 600; margin: 8px 0 14px; }
    .brief ol { margin: 0; padding-left: 20px; }
    .brief li { margin: 5px 0; }
    .empty { color: var(--muted); padding: 16px; border: 1px dashed var(--line); border-radius: 12px; margin-top: 18px; font-size: 14px; }
    .loop { margin-top: 20px; font-size: 13.5px; color: var(--muted); border-top: 1px solid var(--line); padding-top: 14px; }
    .loop b { color: var(--ink); }
    .foot { text-align: center; color: var(--muted); font-size: 12px; padding: 8px 0 24px; }
  </style>
</head>
<body>
  <header>
    <h1>Sikika</h1>
    <span class="sub">Nakuru County — Public Participation Dashboard</span>
    <span class="spacer"></span>
    <span id="stamp" class="sub"></span>
    <button id="refresh">↻ Refresh</button>
  </header>

  <div class="wrap">
    <aside class="card list">
      <h2>Budget items &amp; bills</h2>
      <div id="projects"></div>
    </aside>
    <main class="card detail" id="detail">
      <div class="empty">Select a project to see citizen participation.</div>
    </main>
  </div>
  <div class="foot">Sikika · input reaches citizens on feature phones over USSD/SMS · this page turns it into visible action.</div>

  <script>
    let projects = [];
    let activeId = null;

    const el = (id) => document.getElementById(id);
    const pct = (a, b) => (a + b === 0 ? 0 : Math.round((a / (a + b)) * 100));

    async function loadProjects() {
      const r = await fetch('/api/projects');
      const data = await r.json();
      projects = data.projects || [];
      renderList();
      if (activeId == null && projects.length) selectProject(projects[0].id);
      else if (activeId != null) selectProject(activeId);
      el('stamp').textContent = 'updated ' + new Date().toLocaleTimeString();
    }

    function renderList() {
      const box = el('projects');
      if (!projects.length) { box.innerHTML = '<div class="empty">No projects yet.</div>'; return; }
      box.innerHTML = projects.map(p => {
        const v = p.votes || { support: 0, oppose: 0 };
        const total = v.support + v.oppose;
        return `<div class="proj ${p.id === activeId ? 'active' : ''}" data-id="${p.id}">
          <div class="name">${escapeHtml(p.name)}</div>
          <div class="meta">${escapeHtml(p.ward)} · ${total} vote${total === 1 ? '' : 's'} · ${p.feedback_count} feedback</div>
        </div>`;
      }).join('');
      box.querySelectorAll('.proj').forEach(n =>
        n.addEventListener('click', () => selectProject(Number(n.dataset.id))));
    }

    async function selectProject(id) {
      activeId = id;
      renderList();
      const r = await fetch(`/county/${id}/brief`);
      const d = await r.json();
      renderDetail(d);
    }

    function renderDetail(d) {
      if (d.error) { el('detail').innerHTML = `<div class="empty">${escapeHtml(d.error)}</div>`; return; }
      const v = d.votes || { support: 0, oppose: 0 };
      const total = v.support + v.oppose;
      const sPct = pct(v.support, v.oppose), oPct = 100 - sPct;
      const b = d.brief;

      let briefHtml;
      if (b) {
        briefHtml = `<div class="brief">
          <div class="kicker">AI-aggregated brief for county officials</div>
          <div class="headline">${escapeHtml(b.headline)}</div>
          <strong>Top concerns raised by citizens</strong>
          <ol>${(b.top_concerns || []).map(c => `<li>${escapeHtml(c)}</li>`).join('')}</ol>
        </div>`;
      } else {
        briefHtml = `<div class="empty">No written feedback yet for this item. Votes are shown above;
          the AI brief appears once citizens send feedback by SMS or USSD.</div>`;
      }

      el('detail').innerHTML = `
        <div class="titlerow">
          <h3>${escapeHtml(d.project)}</h3>
          <span class="badge">${escapeHtml(d.ward)}</span>
        </div>
        <div class="tiles">
          <div class="tile"><div class="n">${total}</div><div class="l">Total votes</div></div>
          <div class="tile support"><div class="n">${v.support}</div><div class="l">Support</div></div>
          <div class="tile oppose"><div class="n">${v.oppose}</div><div class="l">Oppose</div></div>
          <div class="tile"><div class="n">${d.feedback_count}</div><div class="l">Feedback received</div></div>
        </div>
        <div class="bar" role="img" aria-label="${sPct}% support, ${oPct}% oppose">
          <div class="s" style="width:${sPct}%"></div><div class="o" style="width:${oPct}%"></div>
        </div>
        <div class="barlabels"><span>Support ${sPct}%</span><span>Oppose ${oPct}%</span></div>
        ${briefHtml}
        <div class="loop"><b>Closing the loop:</b> ${total} citizen vote${total === 1 ? '' : 's'}
          and ${d.feedback_count} written comment${d.feedback_count === 1 ? '' : 's'} —
          collected on basic phones, in mother tongue — are now a report the county can act on.</div>`;
    }

    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, m =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
    }

    el('refresh').addEventListener('click', loadProjects);
    loadProjects();
    setInterval(loadProjects, 15000);
  </script>
</body>
</html>
